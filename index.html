<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino hacia la Pareja</title>
    <style>
        :root {
            --primary-color: #ff4b72;
            --bg-color: #fdf2f4;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 75, 114, 0.15);
            max-width: 600px;
            width: 90%;
        }

        /* Barra de progreso (El Camino) */
        .path-container {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 40px;
        }

        .path-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background-color: #ffe0e6;
            z-index: 1;
            transform: translateY(-50%);
        }

        .path-progress {
            position: absolute;
            top: 50%;
            left: 0;
            height: 4px;
            background-color: var(--primary-color);
            z-index: 2;
            transform: translateY(-50%);
            transition: width 0.4s ease;
        }

        .dot {
            width: 20px;
            height: 20px;
            background-color: #ffe0e6;
            border-radius: 50%;
            z-index: 3;
            transition: all 0.4s ease;
        }

        .dot.active {
            background-color: var(--primary-color);
            transform: scale(1.3);
            box-shadow: 0 0 10px var(--primary-color);
        }

        /* Escenario principal */
        .scene {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .monigotes {
            font-size: 4rem;
            margin: 20px 0;
            transition: all 0.5s ease;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.5;
        }

        /* Botones */
        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-weight: bold;
        }

        button:hover {
            background-color: #e63e62;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="path-container" id="path-dots">
            <div class="path-progress" id="progress-line" style="width: 0%;"></div>
            </div>

        <div class="scene" id="scene-container">
            <h2 id="stage-title">Título</h2>
            <div class="monigotes" id="stage-visual">🧍‍♂️ ... 🧍‍♀️</div>
            <p id="stage-desc">Descripción</p>
        </div>

        <div class="controls">
            <button id="btn-prev" onclick="changeStage(-1)">⬅️ Retroceder</button>
            <button id="btn-next" onclick="changeStage(1)">Avanzar ➡️</button>
        </div>
    </div>

    <script>
        const stages = [
            {
                title: "1. El Radar Periférico",
                visual: "🧍‍♂️ ..... 🧍‍♀️",
                desc: "Aún no os conocéis, pero estáis en el mismo lugar físico. Alguien respira el mismo aire que tú en la misma habitación."
            },
            {
                title: "2. Contacto Visual Táctico",
                visual: "🧍‍♂️ 👀⚡👀 🧍‍♀️",
                desc: "Nadie dice nada, pero las miradas se cruzan más de tres segundos. Suena una alarma interna."
            },
            {
                title: "3. Rompiendo el Hielo",
                visual: "🙋‍♂️ 💬 🙋‍♀️",
                desc: "Una excusa barata, un 'hola' o un mensaje directo. Se inicia la comunicación y descubrís que ambos habláis el mismo idioma."
            },
            {
                title: "4. La Primera Cita",
                visual: "🧍‍♂️ ☕ 🧍‍♀️",
                desc: "Nervios, ropa elegida meticulosamente y fingiendo ser personas completamente normales y equilibradas."
            },
            {
                title: "5. Zona de Confianza",
                visual: "🧑‍🤝‍🧑",
                desc: "Ya hay confianza. Se descubren los defectos, compartís memes absurdos y vais de la mano por la calle."
            },
            {
                title: "6. ¡Somos Pareja!",
                visual: "👩‍❤️‍👨 🎉",
                desc: "Oficialmente juntos. Se ha firmado el contrato invisible. ¡Felicidades, habéis completado el camino!"
            }
        ];

        let currentStage = 0;

        // Inicializar los puntos del camino
        const dotsContainer = document.getElementById('path-dots');
        stages.forEach((_, index) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.id = `dot-${index}`;
            dotsContainer.appendChild(dot);
        });

        function updateUI() {
            // Actualizar contenido
            const scene = document.getElementById('scene-container');
            
            // Forzar reinicio de animación
            scene.style.animation = 'none';
            scene.offsetHeight; /* trigger reflow */
            scene.style.animation = null;

            document.getElementById('stage-title').innerText = stages[currentStage].title;
            document.getElementById('stage-visual').innerText = stages[currentStage].visual;
            document.getElementById('stage-desc').innerText = stages[currentStage].desc;

            // Actualizar botones
            document.getElementById('btn-prev').disabled = currentStage === 0;
            document.getElementById('btn-next').disabled = currentStage === stages.length - 1;

            // Actualizar barra y puntos
            document.getElementById('progress-line').style.width = `${(currentStage / (stages.length - 1)) * 100}%`;
            
            for (let i = 0; i < stages.length; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i <= currentStage) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        function changeStage(direction) {
            currentStage += direction;
            if (currentStage < 0) currentStage = 0;
            if (currentStage >= stages.length) currentStage = stages.length - 1;
            updateUI();
        }

        // Cargar la primera etapa al iniciar
        updateUI();
    </script>
</body>
</html>
